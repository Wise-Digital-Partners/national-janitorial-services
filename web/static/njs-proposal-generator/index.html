      /* ── Gmail API Helper ── */
      let gTokenClient = null;
      let gAccessToken = null;

      function initGmail() {
        if (!CFG.gmail.clientId || CFG.gmail.clientId.includes("YOUR_CLIENT_ID")) {
          console.warn("Gmail API not configured. Edit config.js with your credentials.");
          return;
        }
        try {
          gTokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CFG.gmail.clientId,
            scope: CFG.gmail.scopes,
            callback: (resp) => {
              if (resp.access_token) gAccessToken = resp.access_token;
            },
          });
        } catch (e) {
          console.warn("Gmail init failed:", e);
        }
      }

      async function getGmailToken() {
        if (gAccessToken) return gAccessToken;
        return new Promise((resolve, reject) => {
          if (!gTokenClient) {
            reject(
              new Error("Gmail not configured. Update config.js with your Google Cloud Client ID."),
            );
            return;
          }
          gTokenClient.callback = (resp) => {
            if (resp.error) {
              reject(new Error(resp.error));
              return;
            }
            gAccessToken = resp.access_token;
            resolve(gAccessToken);
          };
          gTokenClient.requestAccessToken({ prompt: "" });
        });
      }

      function buildMimeEmail(to, subject, body, from) {
        const mime = [
          `From: ${from || CFG.gmail.senderEmail}`,
          `To: ${to}`,
          `Subject: ${subject}`,
          `MIME-Version: 1.0`,
          `Content-Type: text/plain; charset=UTF-8`,
          ``,
          body,
        ].join("\r\n");
        return btoa(unescape(encodeURIComponent(mime)))
          .replace(/\+/g, "-")
          .replace(/\//g, "_")
          .replace(/=+$/, "");
      }

      async function sendGmailMessage(to, subject, body) {
        const token = await getGmailToken();
        const raw = buildMimeEmail(to, subject, body);
        const resp = await fetch("https://gmail.googleapis.com/gmail/v1/users/me/messages/send", {
          method: "POST",
          headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
          body: JSON.stringify({ raw }),
        });
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          throw new Error(err.error?.message || `Gmail API error ${resp.status}`);
        }
        return resp.json();
      }

                              color: "#ccc",
                            }}
                          >
                            <span>Special Add-Ons</span>
                            <span>{fmt$(addonSum)}</span>
                          </div>
                        )}
                        {client.hasInitialFee === "yes" &&
                          parseFloat(client.initialFeeAmount) > 0 && (
                            <div
                              style={{
                                display: "flex",
                                justifyContent: "space-between",
                                fontSize: 14,
                                padding: "6px 0",
                                borderBottom: "1px solid #333",
                                color: "#ccc",
                              }}
                            >
                              <span>Initial Fee (one-time)</span>
                              <span>{fmt$(client.initialFeeAmount)}</span>
                            </div>
                          )}
                        <div
                          style={{
                            display: "flex",
                            justifyContent: "space-between",
                            fontSize: 22,
                            fontWeight: 900,
                            padding: "12px 0 0",
                          }}
                        >
                          <span>Total Monthly</span>
                          <span style={{ color: G1 }}>{fmt$(totalMonthly)}</span>
                        </div>
                      </div>
                    </div>
                  )}

                  {/* CLEANER TAB */}
                  {tab === "cleaner" && (
                    <div>
                      <div style={{ fontSize: 13, fontWeight: 700, color: G2, marginBottom: 4 }}>
                        Cleaner Assignment & Schedule
                      </div>
                      <div style={{ fontSize: 11, color: "#888", marginBottom: 16 }}>
                        Internal only — cleaning days & frequency show on SOW, rest stays internal.
                      </div>
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
                        <Field label="Assigned Cleaner Name" required>
                          <Inp
                            val={cleaner.name}
                            set={(v) => ucl("name", v)}
                            ph="Jane Doe"
                            err={hasError("cleaner_name")}
                          />
                        </Field>
                        <Field label="Margin %" required>
                          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                            <input
                              type="number"
                              value={cleaner.marginPercent}
                              onChange={(e) => {
                                ucl("marginPercent", e.target.value);
                                setCleaner((p) => ({ ...p, manualFee: "" }));
                              }}
                              style={{
                                width: 80,
                                border: `1px solid ${
                                  hasError("cleaner_marginPercent") ? RED : "#ddd"
                                }`,
                                borderRadius: 5,
                                padding: "7px 10px",
                                fontSize: 15,
                                fontWeight: 700,
                                textAlign: "center",
                                background: hasError("cleaner_marginPercent") ? "#FFF5F5" : "#fff",
                              }}
                            />
                            <span style={{ fontSize: 16, fontWeight: 700, color: "#888" }}>%</span>
                          </div>
                          <Err msg={hasError("cleaner_marginPercent")} />
                        </Field>
                      </div>

                      <div style={{ marginTop: 20 }}>
                        <div style={{ fontSize: 12, fontWeight: 700, color: G2, marginBottom: 8 }}>
                          Cleaning Days
                          <Req />
                        </div>
                        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                          {cleaner.cleaningDays.map((d, i) => (
                            <DayChip
                              key={d.day}
                              day={d.day}
                              selected={d.on}
                              toggle={() => {
                                setCleaner((p) => {
                                  const n = { ...p, cleaningDays: [...p.cleaningDays] };
                                  n.cleaningDays[i] = {
                                    ...n.cleaningDays[i],
                                    on: !n.cleaningDays[i].on,
                                  };
                                  return n;
                                });
                                if (showErrors)
                                  setErrors((p) => {
                                    const n = { ...p };
                                    delete n.cleaner_cleaningDays;
                                    return n;
                                  });
                              }}
                            />
                          ))}
                        </div>
                        <Err msg={hasError("cleaner_cleaningDays")} />
                      </div>

                      <div style={{ marginTop: 16 }}>
                        <div style={{ fontSize: 12, fontWeight: 700, color: G2, marginBottom: 8 }}>
                          Cleaning Frequency
                          <Req />
                        </div>
                        <div style={{ display: "flex", gap: 8 }}>
                          {[
                            { val: "once_weekly", label: "Once a Week" },
                            { val: "biweekly", label: "Bi-Weekly" },
                            { val: "monthly", label: "Monthly" },
                          ].map((f) => (
                            <button
                              key={f.val}
                              type="button"
                              onClick={() => ucl("cleaningFrequency", f.val)}
                              style={{
                                padding: "8px 18px",
                                borderRadius: 6,
                                border: `2px solid ${
                                  cleaner.cleaningFrequency === f.val ? G1 : "#ddd"
                                }`,
                                background: cleaner.cleaningFrequency === f.val ? G1 : "#fff",
                                color: cleaner.cleaningFrequency === f.val ? "#fff" : BK,
                                cursor: "pointer",
                                fontSize: 12,
                                fontWeight: cleaner.cleaningFrequency === f.val ? 700 : 400,
                              }}
                            >
                              {f.label}
                            </button>
                          ))}
                        </div>
                      </div>

                      <div
                        style={{
                          marginTop: 16,
                          padding: "12px 14px",
                          background: hasError("cleaner_frequencyConfirmed")
                            ? "#FFF5F5"
                            : "#f8f9f8",
                          borderRadius: 6,
                          border: `1px solid ${
                            hasError("cleaner_frequencyConfirmed") ? RED : G1 + "22"
                          }`,
                        }}
                      >
                        <label
                          style={{
                            display: "flex",
                            alignItems: "flex-start",
                            gap: 10,
                            cursor: "pointer",
                          }}
                        >
                          <input
                            type="checkbox"
                            checked={cleaner.frequencyConfirmed}
                            onChange={(e) => ucl("frequencyConfirmed", e.target.checked)}
                            style={{
                              accentColor: G1,
                              marginTop: 2,
                              width: 18,
                              height: 18,
                              flexShrink: 0,
                            }}
                          />
                          <div>
                            <div style={{ fontSize: 12, fontWeight: 700 }}>
                              I confirm the cleaning frequency:{" "}
                              <span style={{ color: G2 }}>
                                {cleaner.cleaningFrequency === "once_weekly"
                                  ? "Once a Week"
                                  : cleaner.cleaningFrequency === "biweekly"
                                  ? "Bi-Weekly"
                                  : "Monthly"}
                              </span>
                            </div>
                            <div style={{ fontSize: 10, color: "#888", marginTop: 2 }}>
                              Matches client schedule of "{client.frequency || "—"}"
                            </div>
                          </div>
                        </label>
                        <Err msg={hasError("cleaner_frequencyConfirmed")} />
                      </div>

                      <div
                        style={{
                          background: "#f8f9f8",
                          borderRadius: 8,
                          padding: 16,
                          marginTop: 20,
                          border: `1px solid ${G1}22`,
                        }}
                      >
                        <div style={{ fontSize: 12, fontWeight: 700, color: G2, marginBottom: 10 }}>
                          Fee Calculation
                        </div>
                        <div
                          style={{
                            display: "grid",
                            gridTemplateColumns: "1fr auto",
                            gap: "6px 20px",
                            fontSize: 13,
                          }}
                        >
                          <span style={{ color: "#666" }}>Client Fee</span>
                          <span style={{ fontWeight: 700, textAlign: "right" }}>
                            {fmt$(totalMonthly)}
                          </span>
                          <span style={{ color: "#666" }}>Margin ({marginPct}%)</span>
                          <span style={{ fontWeight: 700, textAlign: "right", color: G2 }}>
                            {fmt$((totalMonthly * marginPct) / 100)}
                          </span>
                          <div
                            style={{
                              gridColumn: "1 / -1",
                              borderBottom: `1px solid ${G1}44`,
                              margin: "4px 0",
                            }}
                          />
                          <span style={{ fontWeight: 700 }}>Cleaner Fee</span>
                          <span
                            style={{ fontWeight: 800, fontSize: 16, textAlign: "right", color: G1 }}
                          >
                            {fmt$(autoCleanerFee)}
                          </span>
                        </div>
                        <div
                          style={{
                            marginTop: 14,
                            padding: "10px 12px",
                            background: "#fff",
                            borderRadius: 6,
                            border: "1px solid #e0e0e0",
                          }}
                        >
                          <div
                            style={{
                              fontSize: 11,
                              fontWeight: 600,
                              color: "#666",
                              marginBottom: 6,
                            }}
                          >
                            Override (optional)
                          </div>
                          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                            <span style={{ fontSize: 14, color: "#888" }}>$</span>
                            <input
                              type="number"
                              value={cleaner.manualFee}
                              onChange={(e) => ucl("manualFee", e.target.value)}
                              placeholder={autoCleanerFee.toFixed(2)}
                              style={{
                                width: 120,
                                border: "1px solid #ddd",
                                borderRadius: 5,
                                padding: "7px 10px",
                                fontSize: 15,
                                fontWeight: 700,
                                textAlign: "right",
                              }}
                            />
                            {cleaner.manualFee !== "" && (
                              <button
                                onClick={() => ucl("manualFee", "")}
                                style={{
                                  padding: "4px 10px",
                                  borderRadius: 4,
                                  border: `1px solid ${RED}44`,
                                  background: "#FFF5F5",
                                  color: RED,
                                  cursor: "pointer",
                                  fontSize: 10,
                                }}
                              >
                                Reset
                              </button>
                            )}
                          </div>
                          {cleaner.manualFee !== "" && totalMonthly > 0 && (
                            <div style={{ fontSize: 11, color: "#888", marginTop: 6 }}>
                              Effective margin:{" "}
                              <strong style={{ color: actualMargin >= 0 ? G2 : RED }}>
                                {actualMargin.toFixed(1)}%
                              </strong>
                            </div>
                          )}
                        </div>
                      </div>

                      <div
                        style={{
                          background: BK,
                          borderRadius: 8,
                          padding: 20,
                          color: "#fff",
                          marginTop: 20,
                        }}
                      >
                        <div style={{ fontSize: 12, fontWeight: 800, color: G1, marginBottom: 10 }}>
                          CLEANER SUMMARY
                        </div>
                        <div
                          style={{
                            display: "grid",
                            gridTemplateColumns: "1fr auto",
                            gap: "8px 20px",
                            fontSize: 14,
                          }}
                        >
                          {[
                            ["Cleaner", cleaner.name || "—"],
                            [
                              "Days",
                              cleaner.cleaningDays
                                .filter((d) => d.on)
                                .map((d) => d.day.substring(0, 3))
                                .join(", ") || "—",
                            ],
                            [
                              "Frequency",
                              cleaner.cleaningFrequency === "once_weekly"
                                ? "Weekly"
                                : cleaner.cleaningFrequency === "biweekly"
                                ? "Bi-Weekly"
                                : "Monthly",
                            ],
                            ["Client Fee", fmt$(totalMonthly)],
                            ["Cleaner Pay", fmt$(cleanerFee)],
                          ].map(([l, v]) => (
                            <React.Fragment key={l}>
                              <span style={{ color: "#ccc" }}>{l}</span>
                              <span style={{ fontWeight: 700, textAlign: "right" }}>{v}</span>
                            </React.Fragment>
                          ))}
                          <span style={{ color: "#ccc" }}>NJS Margin</span>
                          <span style={{ textAlign: "right", color: G1 }}>
                            {fmt$(totalMonthly - cleanerFee)} ({actualMargin.toFixed(1)}%)
                          </span>
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            )}
          </div>
        );
      }

      ReactDOM.render(React.createElement(App), document.getElementById("app"));
    </script>
  </body>
</html>
