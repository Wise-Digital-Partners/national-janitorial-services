<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="robots" content="noindex, nofollow" />
    .
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NJS Proposal Generator</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --g1: #53af3b;
        --g2: #007041;
        --bk: #101820;
        --gy: #bbbcbc;
        --red: #d32f2f;
      }
      body {
        font-family: "Segoe UI", -apple-system, system-ui, sans-serif;
        color: var(--bk);
        background: #f4f5f4;
        min-height: 100vh;
      }
      input,
      select,
      textarea,
      button {
        font-family: inherit;
      }
      input:focus,
      textarea:focus,
      select:focus {
        outline: none;
      }

      /* ── Print / PDF styles ── */
      @media print {
        html,
        body {
          margin: 0 !important;
          padding: 0 !important;
          background: white !important;
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }
        .no-print {
          display: none !important;
        }
        .print-area {
          margin: 0 !important;
          padding: 0 !important;
          max-width: none !important;
        }
        .pdf-page {
          box-shadow: none !important;
          margin: 0 !important;
          border-radius: 0 !important;
          width: 8.5in !important;
          min-height: 10.85in !important;
          height: auto !important;
          padding: 0.65in 0.75in !important;
          page-break-after: always !important;
          page-break-inside: avoid !important;
          overflow: hidden !important;
          position: relative !important;
        }
        .pdf-page:last-child {
          page-break-after: auto !important;
        }
        @page {
          size: letter;
          margin: 0;
        }
      }
      @media screen {
        .pdf-page {
          box-shadow: 0 2px 16px rgba(0, 0, 0, 0.12);
          margin-bottom: 24px;
          border-radius: 4px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
    <script type="text/babel">
      const { useState, useRef, useCallback, useEffect } = React;

      /* ── Constants ── */
      const G1 = "#53AF3B",
        G2 = "#007041",
        BK = "#101820",
        GY = "#BBBCBC",
        RED = "#D32F2F";
      const fmt$ = (v) =>
        "$" +
        (parseFloat(v) || 0).toLocaleString("en-US", {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2,
        });
      const today = () =>
        new Date().toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" });
      const DAYS = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];

      /* ── SOW Data ── */
      const SECTIONS = [
        {
          title: "Lobby & Common Areas",
          items: [
            "Dust all horizontal surfaces 6ft. & lower (desk, windowsills, tables)",
            "Empty all trash & replace liners",
            "Sweep & mop all hard floors",
            "Vacuum carpets & rugs",
            "Clean glass surfaces & door windows (6ft. & lower)",
            "Spot clean walls, doors, & light switches",
            "Replenish hand sanitizers (if applicable)",
          ],
        },
        {
          title: "Offices & Conference Rooms",
          items: [
            "Dust all horizontal surfaces 6ft. & lower (desk, windowsills, tables)",
            "Empty all trash & replace liners",
            "Sweep & mop all hard floors",
            "Vacuum carpets & rugs",
            "Clean glass surfaces & door windows (6ft. & lower)",
            "Spot clean walls, doors, & light switches",
            "Replenish hand sanitizers (if applicable)",
          ],
        },
        {
          title: "Restrooms",
          items: [
            "Clean & disinfect toilets, urinals, sinks, & counters",
            "Wipe all mirrors and partitions",
            "Refill soap, toilet paper, and paper towels",
            "Mop floors",
            "Empty all trash, including sanitary bins; replace liners",
          ],
        },
        {
          title: "Kitchen & Breakrooms",
          items: [
            "Wipe countertops & tables",
            "Clean exterior of appliances (microwave, fridge, etc.)",
            "Sweep & mop floors",
            "Empty trash & recycling",
          ],
        },
        { title: "Hallways & Stairwells", items: ["Sweep & mop floors"] },
        { title: "Warehouse (Daily)", items: ["Empty all trash & replace liners"] },
        { title: "Exterior Entryways (Daily)", items: ["Pick up and discard of any debris"] },
      ];
      const DAYPORTER_ITEMS = [
        "Spot mop any spills, high traffic areas (as needed)",
        "Vacuum any rugs (as needed)",
        "Empty trash",
        "Clean restrooms (Wipe down counters, refill any paper consumables as needed)",
        "Exterior cleaning (pick up and discard any trash)",
      ];
      const ADDON_LIBRARY = [
        "Clean interior of refrigerator weekly incl removal of items on Fridays",
        "Clean microwave interior weekly",
        "Clean out Air Filters in Restrooms (2x/month)",
        "Window Cleaning (Interior/Exterior)",
        "Pressure washing",
        "Any additional floorcare",
        "Event clean-up services",
        "Sanitize all door handles and light switches",
      ];

      const INTRO_LETTER = `National Janitorial Services (NJS) is pleased to present this proposal for professional cleaning services tailored to your facility's needs.\n\nOur goal is to provide your company with dependable, worry-free service delivered by a skilled workforce and supported by an experienced management team. We take pride in offering consistent, high-quality janitorial solutions at a competitive price.\n\nAt NJS, we believe in customizing our approach to fit each client's unique requirements. We'll work closely with your team to establish procedures that ensure your expectations are not only met—but exceeded. Our reputation is backed by strong references and a commitment to excellence.\n\nBelow, you'll find our company's promise to you, terms and conditions, Scope of Work (SOW) and pricing details for your review.\n\nThank you for the opportunity to earn your business. We look forward to working together.`;

      const COMMITMENT = [
        {
          heading: "Dedicated Quality Control Manager (QCM)",
          intro:
            "Your account will be regularly inspected by a seasoned Quality Control Manager who ensures high facility maintenance standards by:",
          bullets: [
            "Conducting routine site inspections",
            "Coordinating with on-site staff to improve efficiency",
            "Addressing issues before they escalate",
          ],
          after:
            "Your QCM is always accessible for routine questions or urgent matters—and committed to prompt, professional support.",
        },
        {
          heading: "Daily Service Records",
          intro:
            "We maintain updated service logs using your preferred inspection sheets or our own forms. These records:",
          bullets: [
            "Track service quality and identify attention areas",
            "Ensure accountability across shifts",
            "Document and follow up on special requests",
          ],
          after:
            "All action items are reviewed during internal meetings between QCMs, supervisors, and cleaning crews to ensure thorough execution.",
        },
        {
          heading: "Security & Incident Reporting",
          text: "Our team adheres to strict access and safety protocols. Any incidents involving damage, plumbing or electrical issues, or potential security breaches will be reported immediately.",
        },
        {
          heading: "Special Requests & Site Conditions",
          text: "All special requests are handled promptly by your QCM. If unusual accumulations (e.g., post-construction debris, event clean-up) require additional labor or materials, costs will be discussed and approved in advance.",
        },
        {
          heading: "Your Satisfaction, Your Team",
          text: "While we stand behind our staff, your comfort is our priority. If any team member fails to meet expectations, you may request their immediate replacement.",
        },
      ];

      const TERMS = [
        {
          n: "1",
          t: "Scope of Services",
          text: `Services provided by National Janitorial Services ("NJS") are customized to meet the specific needs of your facility, as detailed in the Scope of Work (SOW). Should there be any changes to the agreed-upon task list or cleaning schedule after the commencement of services, NJS reserves the right to adjust pricing accordingly to reflect the updated service level.\n\nInvoices are issued in advance of each monthly cleaning cycle. Example: If service begins on January 1, the invoice dated January 1 will cover all services scheduled for January.`,
        },
        {
          n: "2",
          t: "Payment Terms",
          bullets: [
            "All invoices are due NET 15 (within 15 calendar days of the invoice date).",
            "A 5% late fee will be applied to any invoice not paid by the due date.",
            "Accounts with invoices more than 30 days overdue may be subject to service suspension and additional late fees.",
            "Continued non-payment may result in service termination and referral to a collections agency.",
          ],
        },
        {
          n: "3",
          t: "Payment Methods",
          text: `We accept checks, credit cards, and ACH. Most clients choose a recurring payment setup via credit card or ACH for convenience. Our billing department will assist in setting up your preferred payment method.\n\nIf a scheduled cleaning is missed or skipped at your request, a prorated credit will be applied to the following billing cycle. For support, please notify your assigned Quality Control Manager (QCM) or email our billing team directly at: billing@nationaljanitorialservices.com.`,
        },
        {
          n: "4",
          t: "Service Guarantee",
          text: `We stand behind the quality of our work. All services provided by NJS are backed by a 100% satisfaction guarantee. If any aspect of our service does not meet your expectations, please notify us within 24 hours, and we will make every effort to resolve the issue promptly.\n\nIf we are unable to resolve the matter to your satisfaction, you may terminate the agreement with 30 days' written notice. Any outstanding balances will be due in full at the time of termination.`,
        },
        {
          n: "5",
          t: "Annual Price Adjustments",
          text: "NJS reviews operational costs—such as labor, insurance, supplies, and overhead—on an annual basis. If an adjustment to your monthly pricing is necessary, you will be notified in writing at least 30 days in advance. Any increase will be reasonable and reflective of market conditions.",
        },
        {
          n: "6",
          t: "Access Requirements",
          text: "Client agrees to provide NJS with necessary access to all agreed-upon areas during scheduled cleaning times. Missed cleanings due to access restrictions may not be credited unless prior notice was given.",
        },
        {
          n: "7",
          t: "Liability & Insurance",
          text: `NJS maintains general liability, workers' compensation, and bonding insurance coverage. Proof of insurance can be provided upon request.\n\nNJS is not responsible for pre-existing damage, wear and tear, or unsecured valuables. Please notify us in advance of any sensitive areas or items requiring special attention.`,
        },
        {
          n: "8",
          t: "Non-Solicitation of Personnel",
          text: `To protect the integrity of our workforce, the client agrees not to solicit, hire, engage, or otherwise contract—directly or indirectly—with any current or former employee, contractor, or representative of National Janitorial Services (NJS) for janitorial or related services during the term of this agreement and for a period of one (1) year following its termination.\n\nThis restriction includes but is not limited to direct employment, subcontracting, or engagement through another vendor. Violation of this provision may result in legal action and/or a fee equivalent to 6 months of the individual's estimated compensation.`,
        },
      ];

      const defaultClientEmail = (name, company) =>
        `Dear ${name},\n\nThank you for your interest in National Janitorial Services. Please find attached our proposal for professional cleaning services customized for your facility.\n\nWe've outlined the scope of work, pricing, and terms for your review. If you have any questions or would like to discuss any aspect of the proposal, please don't hesitate to reach out.\n\nWe look forward to the opportunity to serve you.\n\nBest regards,\nPatrick Dillon\nOwner, National Janitorial Services\npatrick@nationaljanitorialservices.com\n(414) 899-9975`;

      /* ── UI Components ── */
      function Tog({ on, set, sm }) {
        const h = sm ? 16 : 22,
          w = h * 1.75;
        return (
          <button
            type="button"
            onClick={() => set(!on)}
            style={{
              width: w,
              height: h,
              borderRadius: h,
              background: on ? G1 : "#ccc",
              border: "none",
              cursor: "pointer",
              position: "relative",
              transition: "background .15s",
              flexShrink: 0,
            }}
          >
            <span
              style={{
                position: "absolute",
                top: 2,
                left: on ? w - h + 2 : 2,
                width: h - 4,
                height: h - 4,
                borderRadius: "50%",
                background: "#fff",
                transition: "left .15s",
              }}
            />
          </button>
        );
      }
      const Req = () => <span style={{ color: RED, marginLeft: 2, fontWeight: 700 }}>*</span>;
      const Err = ({ msg }) =>
        msg ? <div style={{ fontSize: 10, color: RED, marginTop: 2 }}>{msg}</div> : null;

      function Inp({ val, set, ph, style: st, type, err }) {
        return (
          <div>
            <input
              type={type || "text"}
              value={val}
              onChange={(e) => set(e.target.value)}
              placeholder={ph}
              style={{
                width: "100%",
                border: `1px solid ${err ? RED : "#ddd"}`,
                borderRadius: 5,
                padding: "7px 10px",
                fontSize: 13,
                boxSizing: "border-box",
                outline: "none",
                background: err ? "#FFF5F5" : "#fff",
                ...st,
              }}
            />
            <Err msg={err} />
          </div>
        );
      }

      function Field({ label, children, span, required }) {
        return (
          <div style={{ gridColumn: span ? "1 / -1" : undefined }}>
            <label
              style={{
                fontSize: 11,
                fontWeight: 600,
                color: "#555",
                display: "block",
                marginBottom: 3,
              }}
            >
              {label}
              {required && <Req />}
            </label>
            {children}
          </div>
        );
      }

      function DayChip({ day, selected, toggle }) {
        return (
          <button
            type="button"
            onClick={toggle}
            style={{
              padding: "6px 14px",
              borderRadius: 20,
              border: `2px solid ${selected ? G1 : "#ddd"}`,
              background: selected ? G1 : "#fff",
              color: selected ? "#fff" : BK,
              cursor: "pointer",
              fontSize: 12,
              fontWeight: selected ? 700 : 400,
              transition: "all .15s",
            }}
          >
            {day.substring(0, 3)}
          </button>
        );
      }

      /* ── PDF Header Component ── */
      function PdfHeader() {
        return (
          <div
            style={{
              display: "flex",
              justifyContent: "space-between",
              alignItems: "flex-start",
              paddingBottom: 10,
              borderBottom: `3px solid ${G1}`,
              marginBottom: 20,
            }}
          >
            <div>
              <div style={{ fontSize: 24, fontWeight: 900, letterSpacing: 1.5, color: BK }}>
                N<span style={{ color: G1 }}>A</span>TIONAL
              </div>
              <div
                style={{
                  fontSize: 12,
                  color: G1,
                  fontWeight: 600,
                  marginTop: -3,
                  letterSpacing: 0.5,
                }}
              >
                Janitorial Services
              </div>
            </div>
            <div style={{ textAlign: "right", fontSize: 8.5, color: "#666", lineHeight: 1.5 }}>
              500 W. Harbor Dr Unit 303
              <br />
              San Diego, CA 92101
              <br />
              billing@nationaljanitorialservices.com
            </div>
          </div>
        );
      }

      /* ── PDF Page Wrapper ── */
      function PdfPage({ children, isLast }) {
        return (
          <div
            className="pdf-page"
            style={{
              fontFamily: "'Segoe UI','Helvetica Neue',Arial,sans-serif",
              color: BK,
              fontSize: 10,
              lineHeight: 1.55,
              width: "8.5in",
              minHeight: "11in",
              padding: "0.65in 0.75in",
              background: "#fff",
              boxSizing: "border-box",
              position: "relative",
              pageBreakAfter: isLast ? "auto" : "always",
              pageBreakInside: "avoid",
              overflow: "hidden",
            }}
          >
            <PdfHeader />
            {children}
          </div>
        );
      }

      /* ── PDF Pages Component ── */
      function ProposalPDF({ d }) {
        const { client: c, letter, sow, dayPorter, addons, cleaner } = d;
        const date = c.date || today();
        const activeSow = sow.filter((s) => s.items.some((i) => i.on));
        const activeAddons = addons.filter((a) => a.on);
        const addonsTotal = activeAddons.reduce((s, a) => s + (parseFloat(a.price) || 0), 0);
        const base = parseFloat(c.basePrice) || 0;
        const total = base + addonsTotal;
        const initialFeeDisplay = c.hasInitialFee === "yes" ? fmt$(c.initialFeeAmount) : "N/A";
        const selectedDays = cleaner.cleaningDays.filter((d) => d.on).map((d) => d.day);
        const freqLabel =
          cleaner.cleaningFrequency === "once_weekly"
            ? "Once a Week"
            : cleaner.cleaningFrequency === "biweekly"
            ? "Bi-Weekly"
            : "Monthly";

        return (
          <>
            {/* ═══ PAGE 1: Cover Letter ═══ */}
            <PdfPage>
              <div style={{ marginBottom: 6 }}>
                <span style={{ fontWeight: 700, fontSize: 12 }}>CLIENT: </span>
                <span style={{ fontWeight: 700, fontSize: 12, color: G2 }}>{c.company}</span>
              </div>
              <div style={{ fontSize: 9, color: "#777", marginBottom: 20 }}>{date}</div>
              <div style={{ marginBottom: 16, fontSize: 10.5 }}>Dear {c.contactFirst},</div>
              {letter.split("\n\n").map((p, i) => (
                <p key={i} style={{ margin: "0 0 10px", fontSize: 10 }}>
                  {p}
                </p>
              ))}
              <div style={{ marginTop: 16, fontSize: 10 }}>
                Best regards,
                <br />
                <strong style={{ fontSize: 11 }}>Patrick Dillon</strong>
                <br />
                <span style={{ fontSize: 9, color: "#666" }}>
                  Owner · patrick@nationaljanitorialservices.com · (414) 899-9975
                </span>
              </div>
            </PdfPage>

            {/* ═══ PAGE 2: Commitment & Terms ═══ */}
            <PdfPage>
              <div style={{ fontSize: 14, fontWeight: 800, color: BK, marginBottom: 4 }}>
                Our Commitment
              </div>
              <div style={{ fontSize: 9, color: "#888", marginBottom: 10 }}>
                Resources, Process & Quality Assurance
              </div>
              <p style={{ fontSize: 9, margin: "0 0 8px" }}>
                At National Janitorial Services (NJS), we take pride in a proactive, responsive
                approach to service and communication. Here's what you can expect from our team:
              </p>
              {COMMITMENT.map((s, i) => (
                <div key={i} style={{ marginBottom: 6 }}>
                  <div style={{ fontSize: 9.5, fontWeight: 700, color: G2, marginBottom: 1 }}>
                    {s.heading}
                  </div>
                  {s.intro && <p style={{ fontSize: 8.5, margin: "0 0 2px" }}>{s.intro}</p>}
                  {s.text && <p style={{ fontSize: 8.5, margin: 0 }}>{s.text}</p>}
                  {s.bullets && (
                    <div style={{ paddingLeft: 12 }}>
                      {s.bullets.map((b, j) => (
                        <div key={j} style={{ fontSize: 8.5, padding: "0.5px 0" }}>
                          • {b}
                        </div>
                      ))}
                    </div>
                  )}
                  {s.after && <p style={{ fontSize: 8.5, margin: "2px 0 0" }}>{s.after}</p>}
                </div>
              ))}
              <div
                style={{
                  fontSize: 13,
                  fontWeight: 800,
                  color: BK,
                  marginTop: 12,
                  marginBottom: 8,
                  borderTop: `2px solid ${G1}`,
                  paddingTop: 10,
                }}
              >
                Service Terms & Conditions
              </div>
              {TERMS.map((t, i) => (
                <div key={i} style={{ marginBottom: 5 }}>
                  <div style={{ fontSize: 9.5, fontWeight: 700, color: G2 }}>
                    {t.n}. {t.t}
                  </div>
                  {t.text &&
                    t.text.split("\n\n").map((p, j) => (
                      <p key={j} style={{ fontSize: 8.5, margin: "1px 0 3px" }}>
                        {p}
                      </p>
                    ))}
                  {t.bullets && (
                    <div style={{ paddingLeft: 12 }}>
                      {t.bullets.map((b, j) => (
                        <div key={j} style={{ fontSize: 8.5, padding: "0.5px 0" }}>
                          • {b}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              ))}
            </PdfPage>

            {/* ═══ PAGE 3: Scope of Work ═══ */}
            <PdfPage isLast>
              <div
                style={{
                  background: BK,
                  color: "#fff",
                  padding: "8px 14px",
                  borderRadius: 4,
                  marginBottom: 12,
                  display: "flex",
                  justifyContent: "space-between",
                  alignItems: "center",
                }}
              >
                <span style={{ fontSize: 16, fontWeight: 800, letterSpacing: 1 }}>
                  SCOPE OF WORK
                </span>
                <span style={{ fontSize: 9 }}>SOW</span>
              </div>

              {/* Client info grid */}
              <div
                style={{
                  display: "grid",
                  gridTemplateColumns: "1fr 1fr",
                  gap: "2px 20px",
                  fontSize: 9,
                  marginBottom: 4,
                  padding: "6px 10px",
                  background: "#f8f9f8",
                  borderRadius: 4,
                  border: `1px solid ${G1}22`,
                }}
              >
                {[
                  `Date: ${date}`,
                  `Term: ${c.term || "12 Months"}`,
                  `Company: ${c.company}`,
                  `Phone: ${c.phone}`,
                  `Address: ${c.address}`,
                  `Email: ${c.email}`,
                  `Contact: ${c.contactFirst} ${c.contactLast}`,
                  `Client Type: ${c.isNew ? "New Client" : "Existing Client"}`,
                ].map((t, i) => {
                  const [l, ...rest] = t.split(": ");
                  const v = rest.join(": ");
                  return (
                    <div key={i}>
                      <strong>{l}: </strong>
                      {v}
                    </div>
                  );
                })}
              </div>

              {/* Schedule bar */}
              <div
                style={{
                  display: "flex",
                  justifyContent: "space-between",
                  padding: "6px 10px",
                  background: G2,
                  color: "#fff",
                  borderRadius: 4,
                  fontSize: 9.5,
                  marginBottom: 4,
                }}
              >
                <span>
                  Cleaning Days:{" "}
                  <strong>
                    {selectedDays.length > 0
                      ? selectedDays.map((d) => d.substring(0, 3)).join(", ")
                      : "—"}
                  </strong>
                </span>
                <span>
                  Cleaning Frequency: <strong>{freqLabel}</strong>
                </span>
              </div>

              {/* Pricing bar */}
              <div
                style={{
                  display: "flex",
                  justifyContent: "space-between",
                  padding: "5px 10px",
                  background: BK,
                  color: "#fff",
                  borderRadius: 4,
                  fontSize: 9.5,
                  marginBottom: 10,
                }}
              >
                <span>
                  Sq Ft: <strong>{c.sqft}</strong>
                </span>
                <span>
                  Service Freq: <strong>{c.frequency}</strong>
                </span>
                <span>
                  Initial Fee: <strong>{initialFeeDisplay}</strong>
                </span>
                <span>
                  Base Fee: <strong>{fmt$(c.basePrice)}</strong>
                </span>
              </div>

              {/* SOW sections */}
              {activeSow.map((sec, si) => {
                const ai = sec.items.filter((i) => i.on);
                if (!ai.length) return null;
                return (
                  <div key={si} style={{ marginBottom: 5, pageBreakInside: "avoid" }}>
                    <div
                      style={{
                        background: BK,
                        color: "#fff",
                        padding: "3px 10px",
                        fontSize: 9.5,
                        fontWeight: 700,
                        borderRadius: 2,
                        marginBottom: 2,
                      }}
                    >
                      {sec.title}
                    </div>
                    {ai.map((it, ii) => (
                      <div
                        key={ii}
                        style={{ display: "flex", gap: 5, fontSize: 9, padding: "1.5px 10px" }}
                      >
                        <span style={{ color: G1, fontWeight: 700 }}>☑</span>
                        <span>{it.text}</span>
                      </div>
                    ))}
                  </div>
                );
              })}

              {/* Day Porter */}
              {dayPorter.enabled && (
                <div style={{ marginBottom: 5, pageBreakInside: "avoid" }}>
                  <div
                    style={{
                      background: BK,
                      color: "#fff",
                      padding: "3px 10px",
                      fontSize: 9.5,
                      fontWeight: 700,
                      borderRadius: 2,
                      marginBottom: 2,
                    }}
                  >
                    Day Porter Janitorial Services – {dayPorter.hours} Hours Per Day
                  </div>
                  {dayPorter.items
                    .filter((i) => i.on)
                    .map((it, ii) => (
                      <div
                        key={ii}
                        style={{ display: "flex", gap: 5, fontSize: 9, padding: "1.5px 10px" }}
                      >

                        <div style={{ display: "flex", gap: 8 }}>
                          {[
                            { val: "once_weekly", label: "Once a Week" },
                            { val: "biweekly", label: "Bi-Weekly" },
                            { val: "monthly", label: "Monthly" },
                          ].map((f) => (
                            <button
                              key={f.val}
                              type="button"
                              onClick={() => ucl("cleaningFrequency", f.val)}
                              style={{
                                padding: "8px 18px",
                                borderRadius: 6,
                                border: `2px solid ${
                                  cleaner.cleaningFrequency === f.val ? G1 : "#ddd"
                                }`,
                                background: cleaner.cleaningFrequency === f.val ? G1 : "#fff",
                                color: cleaner.cleaningFrequency === f.val ? "#fff" : BK,
                                cursor: "pointer",
                                fontSize: 12,
                                fontWeight: cleaner.cleaningFrequency === f.val ? 700 : 400,
                              }}
                            >
                              {f.label}
                            </button>
                          ))}
                        </div>
                      </div>

                      <div
                        style={{
                          marginTop: 16,
                          padding: "12px 14px",
                          background: hasError("cleaner_frequencyConfirmed")
                            ? "#FFF5F5"
                            : "#f8f9f8",
                          borderRadius: 6,
                          border: `1px solid ${
                            hasError("cleaner_frequencyConfirmed") ? RED : G1 + "22"
                          }`,
                        }}
                      >
                        <label
                          style={{
                            display: "flex",
                            alignItems: "flex-start",
                            gap: 10,
                            cursor: "pointer",
                          }}
                        >
                          <input
                            type="checkbox"
                            checked={cleaner.frequencyConfirmed}
                            onChange={(e) => ucl("frequencyConfirmed", e.target.checked)}
                            style={{
                              accentColor: G1,
                              marginTop: 2,
                              width: 18,
                              height: 18,
                              flexShrink: 0,
                            }}
                          />
                          <div>
                            <div style={{ fontSize: 12, fontWeight: 700 }}>
                              I confirm the cleaning frequency:{" "}
                              <span style={{ color: G2 }}>
                                {cleaner.cleaningFrequency === "once_weekly"
                                  ? "Once a Week"
                                  : cleaner.cleaningFrequency === "biweekly"
                                  ? "Bi-Weekly"
                                  : "Monthly"}
                              </span>
                            </div>
                            <div style={{ fontSize: 10, color: "#888", marginTop: 2 }}>
                              Matches client schedule of "{client.frequency || "—"}"
                            </div>
                          </div>
                        </label>
                        <Err msg={hasError("cleaner_frequencyConfirmed")} />
                      </div>

                      <div
                        style={{
                          background: "#f8f9f8",
                          borderRadius: 8,
                          padding: 16,
                          marginTop: 20,
                          border: `1px solid ${G1}22`,
                        }}
                      >
                        <div style={{ fontSize: 12, fontWeight: 700, color: G2, marginBottom: 10 }}>
                          Fee Calculation
                        </div>
                        <div
                          style={{
                            display: "grid",
                            gridTemplateColumns: "1fr auto",
                            gap: "6px 20px",
                            fontSize: 13,
                          }}
                        >
                          <span style={{ color: "#666" }}>Client Fee</span>
                          <span style={{ fontWeight: 700, textAlign: "right" }}>
                            {fmt$(totalMonthly)}
                          </span>
                          <span style={{ color: "#666" }}>Margin ({marginPct}%)</span>
                          <span style={{ fontWeight: 700, textAlign: "right", color: G2 }}>
                            {fmt$((totalMonthly * marginPct) / 100)}
                          </span>
                          <div
                            style={{
                              gridColumn: "1 / -1",
                              borderBottom: `1px solid ${G1}44`,
                              margin: "4px 0",
                            }}
                          />
                          <span style={{ fontWeight: 700 }}>Cleaner Fee</span>
                          <span
                            style={{ fontWeight: 800, fontSize: 16, textAlign: "right", color: G1 }}
                          >
                            {fmt$(autoCleanerFee)}
                          </span>
                        </div>
                        <div
                          style={{
                            marginTop: 14,
                            padding: "10px 12px",
                            background: "#fff",
                            borderRadius: 6,
                            border: "1px solid #e0e0e0",
                          }}
                        >
                          <div
                            style={{
                              fontSize: 11,
                              fontWeight: 600,
                              color: "#666",
                              marginBottom: 6,
                            }}
                          >
                            Override (optional)
                          </div>
                          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                            <span style={{ fontSize: 14, color: "#888" }}>$</span>
                            <input
                              type="number"
                              value={cleaner.manualFee}
                              onChange={(e) => ucl("manualFee", e.target.value)}
                              placeholder={autoCleanerFee.toFixed(2)}
                              style={{
                                width: 120,
                                border: "1px solid #ddd",
                                borderRadius: 5,
                                padding: "7px 10px",
                                fontSize: 15,
                                fontWeight: 700,
                                textAlign: "right",
                              }}
                            />
                            {cleaner.manualFee !== "" && (
                              <button
                                onClick={() => ucl("manualFee", "")}
                                style={{
                                  padding: "4px 10px",
                                  borderRadius: 4,
                                  border: `1px solid ${RED}44`,
                                  background: "#FFF5F5",
                                  color: RED,
                                  cursor: "pointer",
                                  fontSize: 10,
                                }}
                              >
                                Reset
                              </button>
                            )}
                          </div>
                          {cleaner.manualFee !== "" && totalMonthly > 0 && (
                            <div style={{ fontSize: 11, color: "#888", marginTop: 6 }}>
                              Effective margin:{" "}
                              <strong style={{ color: actualMargin >= 0 ? G2 : RED }}>
                                {actualMargin.toFixed(1)}%
                              </strong>
                            </div>
                          )}
                        </div>
                      </div>

                      <div
                        style={{
                          background: BK,
                          borderRadius: 8,
                          padding: 20,
                          color: "#fff",
                          marginTop: 20,
                        }}
                      >
                        <div style={{ fontSize: 12, fontWeight: 800, color: G1, marginBottom: 10 }}>
                          CLEANER SUMMARY
                        </div>
                        <div
                          style={{
                            display: "grid",
                            gridTemplateColumns: "1fr auto",
                            gap: "8px 20px",
                            fontSize: 14,
                          }}
                        >
                          {[
                            ["Cleaner", cleaner.name || "—"],
                            [
                              "Days",
                              cleaner.cleaningDays
                                .filter((d) => d.on)
                                .map((d) => d.day.substring(0, 3))
                                .join(", ") || "—",
                            ],
                            [
                              "Frequency",
                              cleaner.cleaningFrequency === "once_weekly"
                                ? "Weekly"
                                : cleaner.cleaningFrequency === "biweekly"
                                ? "Bi-Weekly"
                                : "Monthly",
                            ],
                            ["Client Fee", fmt$(totalMonthly)],
                            ["Cleaner Pay", fmt$(cleanerFee)],
                          ].map(([l, v]) => (
                            <React.Fragment key={l}>
                              <span style={{ color: "#ccc" }}>{l}</span>
                              <span style={{ fontWeight: 700, textAlign: "right" }}>{v}</span>
                            </React.Fragment>
                          ))}
                          <span style={{ color: "#ccc" }}>NJS Margin</span>
                          <span style={{ textAlign: "right", color: G1 }}>
                            {fmt$(totalMonthly - cleanerFee)} ({actualMargin.toFixed(1)}%)
                          </span>
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            )}
          </div>
        );
      }

      ReactDOM.render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
